<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Comparativa: Facturado a 12 de marzo cada año</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
body { margin: 0; padding: 20px; background: #1a1a2e; color: #eee; font-family: system-ui; }
h1 { text-align: center; color: #e94560; margin-bottom: 5px; }
.subtitle { text-align: center; color: #888; margin-bottom: 20px; }
.container { max-width: 900px; margin: 0 auto; }
canvas { background: #16213e; border-radius: 12px; padding: 15px; margin-bottom: 30px; }
h2 { color: #533483; margin-top: 30px; }
.highlight { color: #e94560; font-weight: bold; }
.stats { text-align: center; margin: 20px 0; font-size: 18px; }
</style>
</head>
<body>
<div class="container">
<h1>Facturado a 12 de marzo — Comparativa anual</h1>
<p class="subtitle">Solo grabaciones hasta el 12 de marzo de cada año</p>
<div class="stats">
  2026: <span class="highlight">6.284 € (87 sesiones)</span> — 
  Mejor año a estas alturas: <span class="highlight">2024 con 13.112 € (120 sesiones)</span>
</div>
<h2>Ingresos acumulados a 12 de marzo</h2>
<canvas id="revenue"></canvas>
<h2>Sesiones acumuladas a 12 de marzo</h2>
<canvas id="sessions"></canvas>
</div>
<script>
const years = ['2015','2016','2017','2018','2019','2020','2021','2022','2023','2024','2025','2026'];
const revenue = [60,1360,1920,4100,2670,8080,12402,7670,9160,13112,10460,6284];
const sessions = [1,8,22,49,35,82,154,88,99,120,120,87];

const colors = years.map(y => y === '2026' ? '#e94560' : '#533483');

new Chart(document.getElementById('revenue'), {
  type: 'bar',
  data: {
    labels: years,
    datasets: [{
      label: 'Ingresos (€)',
      data: revenue,
      backgroundColor: colors,
      borderRadius: 6
    }]
  },
  options: {
    responsive: true,
    plugins: {
      legend: { display: false },
      tooltip: { callbacks: { label: ctx => ctx.raw.toLocaleString('es-ES') + ' €' } }
    },
    scales: {
      y: { ticks: { color: '#aaa', callback: v => (v/1000).toFixed(0) + 'k€' }, grid: { color: '#333' } },
      x: { ticks: { color: '#eee' }, grid: { display: false } }
    }
  }
});

new Chart(document.getElementById('sessions'), {
  type: 'bar',
  data: {
    labels: years,
    datasets: [{
      label: 'Sesiones',
      data: sessions,
      backgroundColor: colors,
      borderRadius: 6
    }]
  },
  options: {
    responsive: true,
    plugins: {
      legend: { display: false },
      tooltip: { callbacks: { label: ctx => ctx.raw + ' sesiones' } }
    },
    scales: {
      y: { ticks: { color: '#aaa' }, grid: { color: '#333' } },
      x: { ticks: { color: '#eee' }, grid: { display: false } }
    }
  }
});
</script>
</body>
</html>
