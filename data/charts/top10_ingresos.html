<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Top 10 Productores por Ingresos - Drum Session Studio</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
body { margin: 0; padding: 20px; background: #1a1a2e; color: #eee; font-family: system-ui; }
h1 { text-align: center; color: #e94560; margin-bottom: 5px; }
.subtitle { text-align: center; color: #888; margin-bottom: 20px; }
.container { max-width: 900px; margin: 0 auto; }
canvas { background: #16213e; border-radius: 12px; padding: 15px; }
</style>
</head>
<body>
<div class="container">
<h1>Top 10 Productores por Ingresos</h1>
<p class="subtitle">Total grabaciones: 338.722 € (3.758 sesiones, 2013-2026)</p>
<canvas id="chart"></canvas>
</div>
<script>
const data = {
  labels: ['Jorge Villaescusa', 'Marc Martin', 'David Santisteban', 'Roque Baños', 'Jacobo Calderón', 'Alex Vélez', 'John Caballés', 'Koen Moeyaert', 'Fabián Rincón', 'Ten Productions'],
  datasets: [{
    label: 'Ingresos (€)',
    data: [23380, 11210, 9240, 7250, 4960, 3840, 3700, 3391, 3192, 3030],
    backgroundColor: ['#e94560','#0f3460','#533483','#e94560','#0f3460','#533483','#e94560','#0f3460','#533483','#e94560'],
    borderColor: '#e94560',
    borderWidth: 1,
    borderRadius: 6
  }]
};
new Chart(document.getElementById('chart'), {
  type: 'bar',
  data: data,
  options: {
    indexAxis: 'y',
    responsive: true,
    plugins: {
      legend: { display: false },
      tooltip: { callbacks: { label: ctx => ctx.raw.toLocaleString('es-ES') + ' €' } }
    },
    scales: {
      x: { ticks: { color: '#aaa', callback: v => v.toLocaleString('es-ES') + '€' }, grid: { color: '#333' } },
      y: { ticks: { color: '#eee', font: { size: 13 } }, grid: { display: false } }
    }
  }
});
</script>
</body>
</html>
