name: Weekly Blog Post Generator

on:
  schedule:
    # Every Monday at 9:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  generate-blog-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate blog post with Claude API
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node .github/scripts/generate-blog-post.mjs

      - name: Commit and push changes
        run: |
          git config user.name "Blog Bot"
          git config user.email "bot@tonimateos.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          POST_NUM=$(git diff --staged -- src/data/blogPosts.ts | grep -oP 'blog\.post\K\d+' | head -1)
          git commit -m "Add weekly blog post #${POST_NUM:-new}"
          git pull --rebase origin main
          git push
